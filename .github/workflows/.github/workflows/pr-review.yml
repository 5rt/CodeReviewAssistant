name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get the PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude)frontend/package-lock.json' > pr.diff
          head -c 60000 pr.diff > pr_trimmed.diff
          echo "Diff size: $(wc -c < pr_trimmed.diff) bytes"

      - name: Call the review API
        run: |
          jq -Rs '{diff: ., focus: "everything"}' pr_trimmed.diff > payload.json
          for i in 1 2 3; do
            code=$(curl -s -o response.json -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              --max-time 120 \
              -d @payload.json \
              https://codereview-api-tushar.azurewebsites.net/api/review)
            if [ "$code" = "200" ]; then break; fi
            echo "Attempt $i returned $code (API may be cold-starting), retrying in 30s..."
            sleep 30
          done
          cat response.json

      - name: Post the review as a PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issues = [];
            try { issues = JSON.parse(fs.readFileSync('response.json', 'utf8')); } catch (e) {}
            const sev = { high: '🔴', medium: '🟠', low: '🔵' };
            let body;
            if (!Array.isArray(issues)) {
              body = '🤖 **AI Code Review** — the review service returned an unexpected response. See the Actions log.';
            } else if (issues.length === 0) {
              body = '🤖 **AI Code Review** — no issues found in this diff. ✅';
            } else {
              const rows = issues.map(i =>
                `| ${sev[(i.severity||'').toLowerCase()] || '⚪'} ${i.severity} | ${i.category} | ${i.line ?? '—'} | ${i.issue} | ${i.suggestedFix} |`
              ).join('\n');
              body = `🤖 **AI Code Review** — ${issues.length} finding(s)\n\n` +
                `| Severity | Category | Line | Issue | Suggested fix |\n|---|---|---|---|---|\n${rows}\n\n` +
                `<sub>Automated review by [Code Review Assistant](https://kind-desert-061e58f00.7.azurestaticapps.net). Findings are advisory.</sub>`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });