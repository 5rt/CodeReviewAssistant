name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build CodeReviewAssistant.csproj -c Release
      - name: Test
        run: dotnet test tests/CodeReviewAssistant.Tests -c Release